name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    name: Publish .app bundle
    runs-on: macos-26
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Build bundle
        run: make bundle

      - name: Generate artifact names
        id: archive-name
        env:
          TAG: ${{ inputs.tag_name || github.ref_name }}
        run: |
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "zip=autokeyboardlang-${TAG}.zip" >> $GITHUB_OUTPUT
          echo "dmg=autokeyboardlang-${TAG}.dmg" >> $GITHUB_OUTPUT

      - name: Create ZIP
        run: zip -r ${{ steps.archive-name.outputs.zip }} autokeyboardlang.app

      - name: Create DMG
        run: |
          mkdir -p dmg_src
          cp -r autokeyboardlang.app dmg_src/
          ln -s /Applications dmg_src/Applications
          hdiutil create \
            -volname "autokeyboardlang" \
            -srcfolder dmg_src \
            -ov -format UDZO \
            "${{ steps.archive-name.outputs.dmg }}"
          rm -rf dmg_src

      - name: Generate checksums
        run: |
          shasum -a 256 ${{ steps.archive-name.outputs.zip }} > SHA256SUM
          shasum -a 256 ${{ steps.archive-name.outputs.dmg }} >> SHA256SUM

      - name: Upload ZIP to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ./${{ steps.archive-name.outputs.zip }}
          asset_name: ${{ steps.archive-name.outputs.zip }}
          tag: refs/tags/${{ inputs.tag_name || github.ref_name }}
          overwrite: true

      - name: Upload DMG to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ./${{ steps.archive-name.outputs.dmg }}
          asset_name: ${{ steps.archive-name.outputs.dmg }}
          tag: refs/tags/${{ inputs.tag_name || github.ref_name }}
          overwrite: true

      - name: Upload checksum artifact
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: ./SHA256SUM

  publish-checksums:
    needs: publish
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Download checksum
        uses: actions/download-artifact@v4
        with:
          path: checksums

      - name: Combine checksums
        run: |
          cat checksums/**/SHA256SUM > SHA256SUMS
          echo "Checksums:"
          cat SHA256SUMS

      - name: Upload SHA256SUMS to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: SHA256SUMS
          asset_name: SHA256SUMS
          tag: refs/tags/${{ inputs.tag_name || github.ref_name }}
          overwrite: true

  update-tap:
    needs: publish-checksums
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: jakguel/homebrew-autokeyboardlang
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Extract version
        env:
          TAG_INPUT: ${{ inputs.tag_name || github.ref_name }}
        run: echo "VERSION=${TAG_INPUT}" | sed 's/VERSION=v/VERSION=/' >> $GITHUB_ENV

      - name: Download SHA256SUMS
        env:
          TAG: ${{ inputs.tag_name || github.ref_name }}
        run: |
          curl -fSL "https://github.com/jakguel/autokeyboardlang/releases/download/${TAG}/SHA256SUMS" -o SHA256SUMS
          echo "CASK_SHA=$(grep '\.zip' SHA256SUMS | awk '{print $1}')" >> $GITHUB_ENV

      - name: Write cask
        env:
          VERSION: ${{ env.VERSION }}
          CASK_SHA: ${{ env.CASK_SHA }}
        run: |
          python3 - <<'PYEOF'
          import os, pathlib
          v   = os.environ['VERSION']
          sha = os.environ['CASK_SHA']
          pathlib.Path('Casks').mkdir(exist_ok=True)
          content = (
            'cask "autokeyboardlang" do\n'
            '  version "{v}"\n'
            '  sha256 "{s}"\n'
            '\n'
            '  url "https://github.com/jakguel/autokeyboardlang/releases/download/v{v}/autokeyboardlang-v{v}.zip"\n'
            '  name "autokeyboardlang"\n'
            '  desc "Automatic keyboard input language switching for macOS"\n'
            '  homepage "https://github.com/jakguel/autokeyboardlang"\n'
            '\n'
            '  depends_on macos: ">= :sequoia"\n'
            '  depends_on arch: :arm64\n'
            '\n'
            '  app "autokeyboardlang.app"\n'
            '\n'
            '  zap trash: [\n'
            '    "~/Library/LaunchAgents/com.jakguel.autokeyboardlang.plist",\n'
            '    "~/Library/Preferences/com.jakguel.autokeyboardlang.plist",\n'
            '  ]\n'
            'end\n'
          ).format(v=v, s=sha)
          pathlib.Path('Casks/autokeyboardlang.rb').write_text(content)
          print('Wrote Casks/autokeyboardlang.rb  v={v}  sha={s}...'.format(v=v, s=sha[:8]))
          PYEOF

      - name: Commit and push
        env:
          COMMIT_TAG: ${{ inputs.tag_name || github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rm --ignore-unmatch Formula/autokeyboardlang.rb
          git add Casks/autokeyboardlang.rb
          git commit -m "chore: update cask autokeyboardlang ${COMMIT_TAG}"
          git push
