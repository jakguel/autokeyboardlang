name: Tests

on: pull_request

jobs:
  build:
    name: Test build on ${{ matrix.os }} ${{ matrix.os_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-15
            os_name: sequoia
          - os: macos-26
            os_name: tahoe
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Test
        run: swift test

      - name: Build
        run: swift build --configuration release --arch arm64
